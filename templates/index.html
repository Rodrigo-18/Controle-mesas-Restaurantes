<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle de Mesas</title>

<style>
body {
    font-family: 'Segoe UI', Arial;
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
    margin: 0;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #38bdf8;
}

/* FORM */
.form {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #1e293b;
    color: white;
}

button {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* BOTÃO ADD */
.add {
    background: #22c55e;
    color: white;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
}

/* CARD MESA */
.mesa {
    background: #1e293b;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* HOVER */
.mesa:hover {
    transform: scale(1.05);
}

/* MESA OCUPADA */
.ocupada {
    border: 2px solid #22c55e;
}

/* MESA VAZIA */
.vazia {
    opacity: 0.6;
}

/* BOTÕES */
.btn {
    margin-top: 10px;
}

.ver {
    background: #3b82f6;
    color: white;
}

.limpar {
    background: #ef4444;
    color: white;
}

.status {
    margin-top: 8px;
    font-size: 12px;
}
</style>

</head>
<body>

<h1>🍽️ Controle de Mesas</h1>

<!-- FORM -->
<form class="form" method="POST" action="/add">
    <select name="mesa" required>
        {% for i in range(1,31) %}
            <option value="{{i}}">Mesa {{i}}</option>
        {% endfor %}
    </select>

    <input type="text" name="nome" placeholder="Item" required>
    <input type="number" step="0.01" name="valor" placeholder="Valor" required>

    <button type="submit" class="add">Adicionar</button>
</form>

<!-- MESAS -->
<div class="container">
    {% for mesa, itens in mesas.items() %}

    <div class="mesa {% if itens|length > 0 %}ocupada{% else %}vazia{% endif %}">

        <h3>Mesa {{mesa}}</h3>

        {% if itens|length > 0 %}
            <div class="status">🟢 Ocupada ({{itens|length}} itens)</div>

            <div class="btn">
                <a href="/mesa/{{mesa}}">
                    <button class="ver">Ver Conta</button>
                </a>

                <a href="/limpar/{{mesa}}">
                    <button class="limpar">Limpar</button>
                </a>
            </div>
        {% else %}
            <div class="status">⚪ Livre</div>
        {% endif %}

    </div>

    {% endfor %}
</div>

</body>
</html>

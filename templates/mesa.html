<form method="POST" id="formMesa">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .lista { margin-top: 20px; }

        /* Grid ajustado para 5 colunas (Checkbox, Nome, Valor, Remover) */
        .item {
            display: grid;
            grid-template-columns: 40px 1fr 120px 50px;
            align-items: center;
            gap: 10px;
            background: #1e293b;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 12px;
        }

        .nome { font-size: 1.1rem; font-weight: 700; color: #ffffff; }
        .valor {
            width: 100px; background: #0f172a; color: #38bdf8; font-weight: bold;
            border: 1px solid #475569; padding: 8px; border-radius: 6px; text-align: right;
        }
        .remove { background: #991b1b; color: white; border: none; border-radius: 6px; padding: 8px; cursor: pointer; }

        .total-box { margin-top: 25px; padding: 20px; background: #064e3b; border: 2px solid #10b981; border-radius: 12px; text-align: right; font-size: 1.5rem; font-weight: 800; color: #ffffff; }
        .botoes { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 14px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>

    <div class="lista">
        {% for item in itens %}
        <div class="item">
            <input type="checkbox" name="selecionados" value="{{loop.index0}}">
            <span class="nome">{{item.nome}}</span>

            <input type="number" value="{{ "%.2f"|format(item.valor) }}" class="valor" name="valor_{{loop.index0}}" readonly>

            <a href="/remover/{{mesa}}/{{loop.index0}}"><button type="button" class="remove">❌</button></a>
        </div>
        {% endfor %}
    </div>

    <div class="total-box">
        Total selecionado: R$ <span id="totalSelecionado">0.00</span>
    </div>

    <div class="botoes">
        <button type="submit" formaction="{{ url_for('fechar_selecionados', mesa=mesa) }}" class="btn" style="background:#16a34a; color:white;">🖨️ Fechar + Imprimir</button>
        <button type="submit" formaction="{{ url_for('fechar_selecionados_simples', mesa=mesa) }}" class="btn" style="background:#d97706; color:white;">✔️ Fechar Conta</button>
    </div>
</form>

<div style="margin-top:20px; text-align:center;">
    <a href="/" style="text-decoration:none;">
        <button type="button" class="btn" style="background:#334155; color:white;">
            ⬅️ Voltar para Mesas
        </button>
    </a>
</div>

<script>
function calcularTotal() {
    let total = 0;
    document.querySelectorAll('.item').forEach(item => {
        const cb = item.querySelector('input[name="selecionados"]');
        const val = parseFloat(item.querySelector('.valor').value) || 0;

        if (cb.checked) {
            total += val;
            item.style.border = "1px solid #22c55e";
        } else {
            item.style.border = "1px solid #334155";
        }
    });
    document.getElementById('totalSelecionado').innerText = total.toFixed(2).replace('.', ',');
}

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('input[name="selecionados"]').forEach(el => el.addEventListener('change', calcularTotal));
    calcularTotal();
});
</script>
